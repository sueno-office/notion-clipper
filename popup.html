<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Notion Clipper</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #fff;
      color: #37352f;
      width: 380px;
      min-height: 200px;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid #e9e9e7;
    }
    .header h1 { font-size: 15px; font-weight: 600; }
    .header-actions { display: flex; gap: 6px; }
    .icon-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      border-radius: 4px;
      color: #9b9a97;
      font-size: 16px;
      line-height: 1;
      transition: background 0.1s;
    }
    .icon-btn:hover { background: #f0f0ef; color: #37352f; }

    /* DB選択 */
    .db-selector {
      padding: 10px 16px;
      border-bottom: 1px solid #e9e9e7;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .db-selector label { font-size: 12px; color: #787774; white-space: nowrap; }
    select {
      flex: 1;
      padding: 5px 8px;
      border: 1px solid #e9e9e7;
      border-radius: 6px;
      font-size: 13px;
      background: #fff;
      outline: none;
      cursor: pointer;
    }
    select:focus { border-color: #2383e2; }

    /* プリセット */
    .preset-bar {
      padding: 8px 16px;
      border-bottom: 1px solid #e9e9e7;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    .preset-label { font-size: 12px; color: #787774; margin-right: 2px; }
    .preset-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 10px;
      border: 1px solid #e9e9e7;
      border-radius: 100px;
      font-size: 12px;
      cursor: pointer;
      background: #fff;
      transition: background 0.1s;
      color: #37352f;
    }
    .preset-chip:hover { background: #f0f0ef; }
    .preset-chip.active { background: #2383e2; color: #fff; border-color: #2383e2; }
    .preset-chip .del-chip {
      font-size: 14px;
      line-height: 1;
      opacity: 0.6;
      cursor: pointer;
    }
    .preset-chip .del-chip:hover { opacity: 1; }

    /* フォーム */
    .form-area { padding: 12px 16px; max-height: 380px; overflow-y: auto; }
    .field { margin-bottom: 12px; }
    .field label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #787774;
      margin-bottom: 4px;
    }
    .type-badge {
      font-size: 10px;
      background: #f0f0ef;
      padding: 1px 5px;
      border-radius: 3px;
      color: #9b9a97;
    }
    .field input[type="text"],
    .field input[type="number"],
    .field input[type="url"],
    .field input[type="email"],
    .field input[type="tel"],
    .field input[type="date"],
    .field textarea {
      width: 100%;
      padding: 7px 10px;
      border: 1px solid #e9e9e7;
      border-radius: 6px;
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
      font-family: inherit;
    }
    .field input:focus, .field textarea:focus { border-color: #2383e2; }
    .field textarea { resize: vertical; min-height: 60px; }

    /* チェックボックス */
    .checkbox-field {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 0;
    }
    .checkbox-field input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; }
    .checkbox-field span { font-size: 13px; }

    /* セレクト系 */
    .select-options { display: flex; flex-wrap: wrap; gap: 6px; padding: 4px 0; }
    .opt-chip {
      padding: 3px 10px;
      border: 1px solid #e9e9e7;
      border-radius: 100px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.1s;
      background: #fff;
      color: #37352f;
    }
    .opt-chip:hover { background: #f0f0ef; }
    .opt-chip.selected { color: #fff; border-color: transparent; }

    /* Notionのカラー */
    .color-default.selected { background: #9b9a97; }
    .color-gray.selected { background: #9b9a97; }
    .color-brown.selected { background: #64473a; }
    .color-orange.selected { background: #d9730d; }
    .color-yellow.selected { background: #dfab01; }
    .color-green.selected { background: #0f7b6c; }
    .color-blue.selected { background: #0b6e99; }
    .color-purple.selected { background: #6940a5; }
    .color-pink.selected { background: #ad1a72; }
    .color-red.selected { background: #e03e3e; }

    /* フィールド折りたたみ */
    .field-header {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-bottom: 4px;
    }
    .field-header label { margin-bottom: 0; flex: 1; }

    /* ドラッグハンドル */
    .drag-handle {
      color: #c0c0be;
      font-size: 14px;
      cursor: grab;
      padding: 2px 3px;
      border-radius: 3px;
      flex-shrink: 0;
      user-select: none;
      line-height: 1;
    }
    .drag-handle:hover { color: #787774; background: #f0f0ef; }
    .field.dragging { opacity: 0.4; }
    .field.drag-over { border-top: 2px solid #2383e2; margin-top: -2px; }

    /* 折りたたみトグル */
    .field-toggle-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #9b9a97;
      font-size: 14px;
      line-height: 1;
      padding: 2px 4px;
      border-radius: 3px;
      flex-shrink: 0;
    }
    .field-toggle-btn:hover { color: #37352f; background: #f0f0ef; }
    .field-hidden .field-body { display: none; }
    .field-hidden .field-header label { color: #c0c0be; }
    .field-hidden .field-header .type-badge { opacity: 0.5; }

    /* 日付 今日チェックボックス */
    .date-row { display: flex; gap: 6px; align-items: center; }
    .date-row input[type="date"] { flex: 1; }
    .date-row input[type="checkbox"] { width: 14px; height: 14px; cursor: pointer; accent-color: #2383e2; flex-shrink: 0; }
    .date-today-label { font-size: 12px; color: #9b9a97; margin-bottom: 0; cursor: pointer; white-space: nowrap; }

    /* URL 空欄チェック（同一行） */
    .url-input-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .url-input-row input[type="url"] { flex: 1; min-width: 0; }
    .url-input-row input[type="checkbox"] { width: 14px; height: 14px; cursor: pointer; accent-color: #2383e2; flex-shrink: 0; }
    .url-blank-label { font-size: 12px; color: #9b9a97; margin-bottom: 0; cursor: pointer; white-space: nowrap; }

    /* フッター */
    .footer {
      padding: 10px 16px;
      border-top: 1px solid #e9e9e7;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }
    .btn {
      padding: 7px 16px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s;
      font-weight: 500;
    }
    .btn-primary { background: #2383e2; color: #fff; }
    .btn-primary:hover { background: #1a6fc0; }
    .btn-primary:disabled { background: #a0c3e8; cursor: not-allowed; }
    .btn-secondary { background: #f0f0ef; color: #37352f; }
    .btn-secondary:hover { background: #e0e0de; }
    .btn-ghost { background: none; color: #787774; font-size: 12px; padding: 7px 10px; }
    .btn-ghost:hover { background: #f0f0ef; color: #37352f; }

    /* 状態 */
    .notice {
      padding: 16px;
      text-align: center;
      font-size: 13px;
      color: #787774;
    }
    .notice a { color: #2383e2; cursor: pointer; text-decoration: none; }
    .notice a:hover { text-decoration: underline; }
    .status-bar {
      padding: 8px 16px;
      font-size: 12px;
      border-top: 1px solid #e9e9e7;
      display: none;
    }
    .status-bar.success { background: #e6f4e6; color: #2d7a2d; display: block; }
    .status-bar.error { background: #fce8e8; color: #c0392b; display: block; }
    .status-bar.loading { background: #e8f0fe; color: #1a6fc0; display: block; }

    /* プリセット保存ダイアログ */
    .preset-dialog {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    .preset-dialog.hidden { display: none; }
    .dialog-box {
      background: #fff;
      border-radius: 8px;
      padding: 20px;
      width: 280px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    }
    .dialog-box h3 { font-size: 14px; margin-bottom: 12px; }
    .dialog-box input {
      width: 100%;
      padding: 7px 10px;
      border: 1px solid #e9e9e7;
      border-radius: 6px;
      font-size: 13px;
      outline: none;
      margin-bottom: 12px;
    }
    .dialog-box input:focus { border-color: #2383e2; }
    .dialog-actions { display: flex; justify-content: flex-end; gap: 8px; }
  </style>
</head>
<body>

  <!-- ヘッダー -->
  <div class="header">
    <h1>Notion Clipper</h1>
    <div class="header-actions">
      <button class="icon-btn" id="open-options" title="設定">⚙</button>
    </div>
  </div>

  <!-- メインコンテンツ -->
  <div id="main-content">
    <div class="notice" id="loading-notice">読み込み中...</div>
  </div>

  <!-- ステータスバー -->
  <div id="status-bar" class="status-bar"></div>

  <!-- プリセット保存ダイアログ -->
  <div class="preset-dialog hidden" id="preset-dialog">
    <div class="dialog-box">
      <h3>プリセットとして保存</h3>
      <input type="text" id="preset-name-input" placeholder="プリセット名">
      <div class="dialog-actions">
        <button class="btn btn-secondary" id="cancel-preset">キャンセル</button>
        <button class="btn btn-primary" id="confirm-preset">保存</button>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
