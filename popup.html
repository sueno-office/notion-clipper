<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Notisnap</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #fff;
      color: #37352f;
      width: 380px;
      height: 520px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: hidden;
    }
    .header {
      display: flex;
      align-items: center;
      padding: 8px 12px;
      border-bottom: 1px solid #e9e9e7;
      gap: 8px;
      flex-shrink: 0;
    }
    .header h1 { font-size: 15px; font-weight: 600; white-space: nowrap; }
    .header-btns { display: flex; gap: 6px; flex: 1; }
    .header-actions { display: flex; gap: 4px; }
    .btn-sm { padding: 5px 12px; font-size: 12px; }
    .icon-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      border-radius: 4px;
      color: #9b9a97;
      font-size: 16px;
      line-height: 1;
      transition: background 0.1s;
    }
    .icon-btn:hover { background: #f0f0ef; color: #37352f; }
    .icon-btn.clip-active { background: #e8f0fe; color: #2383e2; }

    /* DB選択 */
    .db-selector {
      padding: 10px 16px;
      border-bottom: 1px solid #e9e9e7;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .db-selector label { font-size: 12px; color: #787774; white-space: nowrap; }
    select {
      flex: 1;
      padding: 5px 8px;
      border: 1px solid #e9e9e7;
      border-radius: 6px;
      font-size: 13px;
      background: #fff;
      outline: none;
      cursor: pointer;
    }
    select:focus { border-color: #2383e2; }

    /* 2カラムレイアウト */
    .main-layout {
      flex: 1;
      display: flex;
      min-height: 0;
      overflow: hidden;
    }
    .left-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      overflow: hidden;
    }
    .right-col {
      width: 175px;
      flex-shrink: 0;
      border-left: 1px solid #e9e9e7;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      font-size: 12px;
    }
    .right-section {
      padding: 8px 10px;
      border-bottom: 1px solid #e9e9e7;
    }
    .right-section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 5px;
    }
    .right-section-label { font-size: 11px; color: #9b9a97; display: block; margin-bottom: 5px; }
    .right-col select {
      width: 100%;
      padding: 4px 6px;
      border: 1px solid #e9e9e7;
      border-radius: 5px;
      font-size: 12px;
      background: #fff;
      outline: none;
      cursor: pointer;
    }
    .right-col select:focus { border-color: #2383e2; }

    /* プリセット（右カラム縦並び） */
    #preset-chips { display: flex; flex-direction: column; gap: 3px; }
    .preset-chip {
      display: flex;
      width: 100%;
      align-items: center;
      gap: 4px;
      padding: 4px 7px;
      border: 1px solid #e9e9e7;
      border-radius: 5px;
      font-size: 11px;
      cursor: pointer;
      background: #fff;
      transition: background 0.1s;
      color: #37352f;
      text-align: left;
    }
    .preset-chip:hover { background: #f0f0ef; }
    .preset-chip.active { background: #2383e2; color: #fff; border-color: #2383e2; }
    .preset-chip-inner { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 1px; }
    .preset-chip-name { font-size: 11px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .preset-chip .preset-db-badge {
      font-size: 9px;
      background: #e9e9e7;
      padding: 1px 4px;
      border-radius: 6px;
      color: #9b9a97;
      align-self: flex-start;
    }
    .preset-chip.active .preset-db-badge {
      background: rgba(255,255,255,0.25);
      color: rgba(255,255,255,0.85);
    }
    .preset-chip .del-chip {
      font-size: 13px;
      line-height: 1;
      opacity: 0.5;
      cursor: pointer;
      flex-shrink: 0;
    }
    .preset-chip .del-chip:hover { opacity: 1; }
    .preset-drag-handle { font-size: 11px; color: #c0c0be; cursor: grab; flex-shrink: 0; padding: 0 2px; }
    .preset-chip.active .preset-drag-handle { color: rgba(255,255,255,0.6); }
    .preset-chip.dragging { opacity: 0.4; }
    .preset-chip.drag-over { border-color: #2383e2; background: #e8f0fe; }
    .btn-ghost-xs {
      background: none;
      border: none;
      cursor: pointer;
      color: #9b9a97;
      font-size: 16px;
      line-height: 1;
      padding: 0 2px;
      border-radius: 3px;
    }
    .btn-ghost-xs:hover { color: #37352f; background: #f0f0ef; }

    /* フォーム */
    .form-area { padding: 12px 16px; flex: 1; min-height: 0; overflow-y: auto; }
    .field { margin-bottom: 12px; }
    .field label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #787774;
      margin-bottom: 4px;
    }
    .type-badge {
      font-size: 10px;
      background: #f0f0ef;
      padding: 1px 5px;
      border-radius: 3px;
      color: #9b9a97;
    }
    .field input[type="text"],
    .field input[type="number"],
    .field input[type="url"],
    .field input[type="email"],
    .field input[type="tel"],
    .field input[type="date"],
    .field textarea {
      width: 100%;
      padding: 7px 10px;
      border: 1px solid #e9e9e7;
      border-radius: 6px;
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
      font-family: inherit;
    }
    .field input:focus, .field textarea:focus { border-color: #2383e2; }
    .field textarea { resize: vertical; min-height: 60px; }

    /* チェックボックス */
    .checkbox-field {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 0;
    }
    .checkbox-field input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; }
    .checkbox-field span { font-size: 13px; }

    /* セレクト系 */
    .select-options { display: flex; flex-wrap: wrap; gap: 6px; padding: 4px 0; }
    .opt-chip {
      padding: 3px 10px;
      border: 1px solid #e9e9e7;
      border-radius: 100px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.1s;
      background: #fff;
      color: #37352f;
    }
    .opt-chip:hover { background: #f0f0ef; }
    .opt-chip.selected { color: #fff; border-color: transparent; }

    /* Notionのカラー */
    .color-default.selected { background: #9b9a97; }
    .color-gray.selected { background: #9b9a97; }
    .color-brown.selected { background: #64473a; }
    .color-orange.selected { background: #d9730d; }
    .color-yellow.selected { background: #dfab01; }
    .color-green.selected { background: #0f7b6c; }
    .color-blue.selected { background: #0b6e99; }
    .color-purple.selected { background: #6940a5; }
    .color-pink.selected { background: #ad1a72; }
    .color-red.selected { background: #e03e3e; }

    /* フィールド折りたたみ */
    .field-header {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-bottom: 4px;
    }
    .field-header label { margin-bottom: 0; flex: 1; }

    /* ドラッグハンドル */
    .drag-handle {
      color: #c0c0be;
      font-size: 14px;
      cursor: grab;
      padding: 2px 3px;
      border-radius: 3px;
      flex-shrink: 0;
      user-select: none;
      line-height: 1;
    }
    .drag-handle:hover { color: #787774; background: #f0f0ef; }
    .field.dragging { opacity: 0.4; }
    .field.drag-over { border-top: 2px solid #2383e2; margin-top: -2px; }

    /* 折りたたみトグル */
    .field-toggle-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #9b9a97;
      font-size: 14px;
      line-height: 1;
      padding: 2px 4px;
      border-radius: 3px;
      flex-shrink: 0;
    }
    .field-toggle-btn:hover { color: #37352f; background: #f0f0ef; }
    .field-hidden .field-body { display: none; }
    .field-hidden .field-header label { color: #c0c0be; }
    .field-hidden .field-header .type-badge { opacity: 0.5; }

    /* 日付 今日チェックボックス */
    .date-row { display: flex; gap: 6px; align-items: center; }
    .date-row input[type="date"] { flex: 1; }
    .date-row input[type="checkbox"] { width: 14px; height: 14px; cursor: pointer; accent-color: #2383e2; flex-shrink: 0; }
    .date-today-label { font-size: 12px; color: #9b9a97; margin-bottom: 0; cursor: pointer; white-space: nowrap; }

    /* URL 空欄チェック（同一行） */
    .url-input-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .url-input-row input[type="url"] { flex: 1; min-width: 0; }
    .url-input-row input[type="checkbox"] { width: 14px; height: 14px; cursor: pointer; accent-color: #2383e2; flex-shrink: 0; }
    .url-blank-label { font-size: 12px; color: #9b9a97; margin-bottom: 0; cursor: pointer; white-space: nowrap; }

    .btn {
      padding: 7px 16px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s;
      font-weight: 500;
    }
    .btn-primary { background: #2383e2; color: #fff; }
    .btn-primary:hover { background: #1a6fc0; }
    .btn-primary:disabled { background: #a0c3e8; cursor: not-allowed; }
    .btn-secondary { background: #f0f0ef; color: #37352f; }
    .btn-secondary:hover { background: #e0e0de; }
    .btn-ghost { background: none; color: #787774; font-size: 12px; padding: 7px 10px; }
    .btn-ghost:hover { background: #f0f0ef; color: #37352f; }

    /* 状態 */
    .notice {
      padding: 16px;
      text-align: center;
      font-size: 13px;
      color: #787774;
    }
    .notice a { color: #2383e2; cursor: pointer; text-decoration: none; }
    .notice a:hover { text-decoration: underline; }
    .status-bar {
      padding: 8px 16px;
      font-size: 12px;
      border-top: 1px solid #e9e9e7;
      display: none;
    }
    .status-bar.success { background: #e6f4e6; color: #2d7a2d; display: block; }
    .status-bar.error { background: #fce8e8; color: #c0392b; display: block; }
    .status-bar.loading { background: #e8f0fe; color: #1a6fc0; display: block; }

    /* 保存履歴 */
    .history-panel { border-bottom: 1px solid #e9e9e7; }
    .history-header { padding: 6px 16px 2px; display: flex; align-items: center; }
    .history-label { font-size: 11px; color: #9b9a97; }
    .history-item {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 3px 4px;
      font-size: 11px;
      color: #37352f;
      text-decoration: none;
      border-radius: 4px;
      transition: background 0.1s;
    }
    .history-item:hover { background: #f0f0ef; }
    .history-item-title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .history-item-db { font-size: 9px; color: #9b9a97; white-space: nowrap; flex-shrink: 0; }
    .history-saved-badge {
      font-size: 9px; color: #2d7a2d; background: #e6f4e6;
      padding: 1px 4px; border-radius: 8px; white-space: nowrap; flex-shrink: 0;
    }
    .history-empty { font-size: 11px; color: #c0c0be; padding: 2px 0; }
    .history-item-wrapper { display: flex; align-items: center; }
    .history-item-wrapper .history-item { flex: 1; min-width: 0; }
    .history-del-btn {
      background: none; border: none; color: #c0c0be; cursor: pointer;
      font-size: 13px; padding: 2px 4px; flex-shrink: 0;
      opacity: 0; transition: opacity 0.15s;
    }
    .history-item-wrapper:hover .history-del-btn { opacity: 1; }
    .history-del-btn:hover { color: #eb5757; }

    /* クリップパネル */
    .clip-panel {
      padding: 8px 16px;
      border-bottom: 1px solid #e9e9e7;
      background: #f8f8f7;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .clip-panel.hidden { display: none; }
    .clip-row { display: flex; align-items: center; gap: 8px; }
    .clip-icon { font-size: 14px; flex-shrink: 0; width: 20px; text-align: center; }
    .clip-input {
      flex: 1;
      padding: 5px 8px;
      border: 1px solid #e9e9e7;
      border-radius: 6px;
      font-size: 12px;
      outline: none;
      background: #fff;
      min-width: 0;
    }
    .clip-input:focus { border-color: #2383e2; }
    .clip-img-thumb {
      width: 32px;
      height: 32px;
      object-fit: cover;
      border-radius: 4px;
      border: 1px solid #e9e9e7;
      flex-shrink: 0;
    }
    .clip-img-thumb.hidden { display: none; }
    .clip-check { width: 14px; height: 14px; cursor: pointer; accent-color: #2383e2; flex-shrink: 0; }
    .clip-label { font-size: 12px; color: #37352f; cursor: pointer; }
    .clip-body-len { font-size: 11px; color: #9b9a97; margin-left: auto; }

    /* カラム区切りリサイズ */
    .col-divider {
      width: 5px;
      flex-shrink: 0;
      cursor: col-resize;
      background: transparent;
      transition: background 0.15s;
    }
    .col-divider:hover { background: #e9e9e7; }
    .col-divider.dragging { background: #2383e2; }

    /* リサイズハンドル */
    #resize-handle {
      position: fixed;
      bottom: 0;
      right: 0;
      width: 14px;
      height: 14px;
      cursor: nwse-resize;
      z-index: 9999;
    }
    #resize-handle::after {
      content: '';
      position: absolute;
      bottom: 3px;
      right: 3px;
      width: 0;
      height: 0;
      border-style: solid;
      border-width: 0 0 8px 8px;
      border-color: transparent transparent #c0c0be transparent;
    }
    #resize-handle:hover::after { border-color: transparent transparent #787774 transparent; }

    /* プリセット保存ダイアログ */
    .preset-dialog {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    .preset-dialog.hidden { display: none; }
    .dialog-box {
      background: #fff;
      border-radius: 8px;
      padding: 20px;
      width: 280px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    }
    .dialog-box h3 { font-size: 14px; margin-bottom: 12px; }
    .dialog-box input {
      width: 100%;
      padding: 7px 10px;
      border: 1px solid #e9e9e7;
      border-radius: 6px;
      font-size: 13px;
      outline: none;
      margin-bottom: 12px;
    }
    .dialog-box input:focus { border-color: #2383e2; }
    .dialog-actions { display: flex; justify-content: flex-end; gap: 8px; }
  </style>
</head>
<body>

  <!-- ヘッダー -->
  <div class="header">
    <h1>Notisnap</h1>
    <div class="header-btns">
      <button class="btn btn-secondary btn-sm" id="clear-btn">クリア</button>
      <button class="btn btn-primary btn-sm" id="submit-btn">Notionに追加</button>
    </div>
    <div class="header-actions">
      <button class="icon-btn" id="clip-mode-btn" title="クリップモード">📎</button>
      <button class="icon-btn" id="open-options" title="設定">⚙</button>
    </div>
  </div>

  <!-- メインコンテンツ -->
  <div id="main-content">
    <div class="notice" id="loading-notice">読み込み中...</div>
  </div>

  <!-- ステータスバー -->
  <div id="status-bar" class="status-bar"></div>

  <!-- プリセット保存ダイアログ -->
  <div class="preset-dialog hidden" id="preset-dialog">
    <div class="dialog-box">
      <h3>プリセットとして保存</h3>
      <input type="text" id="preset-name-input" placeholder="プリセット名">
      <div class="dialog-actions">
        <button class="btn btn-secondary" id="cancel-preset">キャンセル</button>
        <button class="btn btn-primary" id="confirm-preset">保存</button>
      </div>
    </div>
  </div>

  <div id="resize-handle" title="ドラッグしてサイズ変更"></div>
  <script src="popup.js"></script>
</body>
</html>
